name: Platform - Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'platform/**'
      - 'modules/**'
      - '.github/workflows/platform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'platform/**'
      - 'modules/**'

env:
  TERRAFORM_VERSION: '1.5.0'

jobs:
  platform-plan:
    name: Platform Plan - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.PLATFORM_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./platform
        run: |
          terraform init \
            -backend-config=resource_group_name=${{ secrets.TFSTATE_RG }} \
            -backend-config=storage_account_name=${{ secrets.TFSTATE_SA }} \
            -backend-config=container_name=platform \
            -backend-config=key=platform-${{ matrix.environment }}.tfstate

      - name: Terraform Plan
        working-directory: ./platform
        run: |
          terraform plan \
            -var-file=${{ matrix.environment }}/terraform.tfvars \
            -var subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            -var tenant_id=${{ secrets.AZURE_TENANT_ID }} \
            -var client_id=${{ secrets.PLATFORM_SP_CLIENT_ID }} \
            -out=tfplan-${{ matrix.environment }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: platform-tfplan-${{ matrix.environment }}
          path: platform/tfplan-${{ matrix.environment }}
          retention-days: 7

      - name: Comment PR with Plan Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planFile = './platform/tfplan-${{ matrix.environment }}';
            if (fs.existsSync(planFile)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Platform Terraform Plan - ${{ matrix.environment }}\n\`\`\`\nRun: terraform show $planFile\n\`\`\``
              });
            }

  platform-apply:
    name: Platform Apply - ${{ matrix.environment }}
    needs: platform-plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        environment: [dev, staging, prod]
      max-parallel: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.PLATFORM_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v3
        with:
          name: platform-tfplan-${{ matrix.environment }}
          path: platform/

      - name: Terraform Init
        working-directory: ./platform
        run: |
          terraform init \
            -backend-config=resource_group_name=${{ secrets.TFSTATE_RG }} \
            -backend-config=storage_account_name=${{ secrets.TFSTATE_SA }} \
            -backend-config=container_name=platform \
            -backend-config=key=platform-${{ matrix.environment }}.tfstate

      - name: Terraform Apply
        working-directory: ./platform
        run: terraform apply -auto-approve tfplan-${{ matrix.environment }}

      - name: Export Outputs
        working-directory: ./platform
        run: |
          terraform output -json > outputs-${{ matrix.environment }}.json
          echo "Platform deployment (${{ matrix.environment }}) completed successfully"

      - name: Upload Outputs
        uses: actions/upload-artifact@v3
        with:
          name: platform-outputs-${{ matrix.environment }}
          path: platform/outputs-${{ matrix.environment }}.json
          retention-days: 30
