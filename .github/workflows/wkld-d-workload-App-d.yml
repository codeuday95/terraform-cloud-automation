name: Workload-D - Build & Push to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter/**'
      - '.github/workflows/wkld-d-workload-App-d.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter/**'
  workflow_dispatch:
    inputs:
      push_to_acr:
        description: 'Push images to ACR after build and smoke test?'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: acrwkldddeveastus.azurecr.io
  IMAGE_NAME_WEB: hitcounter_web
  IMAGE_NAME_MONGODB: hitcounter_mongodb
  IMAGE_TAG: "1.0"

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Node.js Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter/NodeDockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MongoDB Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter/MongoDockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build Successful** - Docker images built successfully.\n\n**Images Ready:**\n- `' + '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}`\n- `' + '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:${{ env.IMAGE_TAG }}`\n\nApprove to push to ACR on merge to main.'
            })

  smoke-test:
    name: Smoke Test App
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app stack
        working-directory: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter
        run: |
          docker compose up -d --build

      - name: Wait for app to become ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost/health >/dev/null; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 5
          done
          echo "App did not become healthy in time"
          docker ps
          docker logs $(docker ps -q --filter "name=node") || true
          exit 1

      - name: Verify app endpoints
        run: |
          curl -fsS http://localhost/health
          curl -fsS http://localhost/stage

      - name: Tear down stack
        if: always()
        working-directory: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter
        run: |
          docker compose down -v

  push-to-acr:
    name: Push Images to ACR
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.push_to_acr == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.WORKLOAD_D_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR credentials
        run: |
          ACR_USERNAME=$(az acr credential show \
            --name $(echo ${{ env.REGISTRY }} | cut -d. -f1) \
            --query "username" -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name $(echo ${{ env.REGISTRY }} | cut -d. -f1) \
            --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "REGISTRY_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Push Node.js Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter/NodeDockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push MongoDB Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./Azure/workloads/Workload-D-Aks-automation/Apps/hit-counter/MongoDockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:${{ env.IMAGE_TAG }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release Annotation
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Hit Counter Docker images pushed to ACR',
              auto_merge: false,
              required_contexts: []
            })
