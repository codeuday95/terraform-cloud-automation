apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}-database
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-database
  serviceName: {{ .Chart.Name }}-database
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-database
    spec:
      containers:
        - name: {{ .Chart.Name }}-database
          image: "{{ .Values.image.registry }}/{{ .Values.image.mongodb.repository }}:{{ .Values.image.mongodb.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
