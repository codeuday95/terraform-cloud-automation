name: Azure Self Hosted Runner

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform (create or destroy)"
        required: true
        default: "create"
        type: choice
        options:
          - create
          - destroy
      github_repo_url:
        description: "GitHub repository or organization URL (e.g., https://github.com/my-org/my-repo)"
        required: true
        type: string
      enable_public_ip:
        description: "Enable Public IP (Not recommended. Runner uses Azure RunCommand to install securely without SSH)"
        required: true
        default: false
        type: boolean

env:
  RG_NAME: rg-github-runner-aks
  LOCATION: centralindia
  VM_NAME: gh-runner-aks-b1ms
  VM_SIZE: Standard_B1ms

jobs:
  runner-lifecycle:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    #################################################################
    # CREATE
    #################################################################
    - name: Create Resource Group
      if: inputs.action == 'create'
      run: |
        az group create --name ${{ env.RG_NAME }} --location ${{ env.LOCATION }}

    - name: Create or Reuse Key Vault & Set Policies
      if: inputs.action == 'create'
      run: |
        EXISTING_KV=$(az keyvault list --resource-group ${{ env.RG_NAME }} --query "[0].name" -o tsv 2>/dev/null || true)
        
        if [ -n "$EXISTING_KV" ]; then
          echo "Found existing Key Vault: $EXISTING_KV"
          echo "KEYVAULT_NAME=$EXISTING_KV" >> $GITHUB_ENV
          
          # Ensure SPN has permission
          az keyvault set-policy \
            --name $EXISTING_KV \
            --spn ${{ secrets.AZURE_CLIENT_ID }} \
            --secret-permissions set get list delete
        else
          NEW_KV_NAME="kv-run-${{ github.run_id }}"
          echo "Creating new Key Vault: $NEW_KV_NAME"
          echo "KEYVAULT_NAME=$NEW_KV_NAME" >> $GITHUB_ENV
          
          az keyvault create \
            --name $NEW_KV_NAME \
            --resource-group ${{ env.RG_NAME }} \
            --location ${{ env.LOCATION }} \
            --enable-rbac-authorization false
            
          az keyvault set-policy \
            --name $NEW_KV_NAME \
            --spn ${{ secrets.AZURE_CLIENT_ID }} \
            --secret-permissions set get list delete
        fi

    - name: Save VM Credentials To Key Vault
      if: inputs.action == 'create'
      run: |
        az keyvault secret set \
          --vault-name ${{ env.KEYVAULT_NAME }} \
          --name vm-admin-username \
          --value "${{ secrets.VM_ADMIN_USERNAME }}"

        az keyvault secret set \
          --vault-name ${{ env.KEYVAULT_NAME }} \
          --name vm-admin-password \
          --value "${{ secrets.VM_ADMIN_PASSWORD }}"

    - name: Create VM
      if: inputs.action == 'create'
      run: |
        declare -a ARGS
        if [ "${{ inputs.enable_public_ip }}" = "true" ]; then
          ARGS+=(--public-ip-sku Standard)
        else
          ARGS+=(--public-ip-address "")
        fi

        az vm create \
          --resource-group ${{ env.RG_NAME }} \
          --name ${{ env.VM_NAME }} \
          --image Ubuntu2204 \
          --size ${{ env.VM_SIZE }} \
          --storage-sku StandardSSD_LRS \
          --admin-username "${{ secrets.VM_ADMIN_USERNAME }}" \
          --admin-password "${{ secrets.VM_ADMIN_PASSWORD }}" \
          --authentication-type password \
          --assign-identity \
          "${ARGS[@]}"

    - name: Assign Roles to VM Identity
      if: inputs.action == 'create'
      run: |
        PRINCIPAL_ID=$(az vm identity show \
          --resource-group "${{ env.RG_NAME }}" \
          --name "${{ env.VM_NAME }}" \
          --query principalId \
          -o tsv)

        echo "Waiting 15 seconds for AAD propagation..."
        sleep 15

        # # Assign Contributor (This should work)
        # az role assignment create \
        #   --assignee-object-id "$PRINCIPAL_ID" \
        #   --assignee-principal-type "ServicePrincipal" \
        #   --role "Contributor" \
        #   --scope "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RG_NAME }}"

        # NOTE: The User Access Administrator role is commented out for now.
        # It typically requires elevated/unrestricted ABAC policies to grant.
        # az role assignment create \
        #   --assignee-object-id "$PRINCIPAL_ID" \
        #   --assignee-principal-type "ServicePrincipal" \
        #   --role "User Access Administrator" \
        #   --scope "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RG_NAME }}" || \
        #   echo "::warning::Could not assign 'User Access Administrator' due to ABAC restrictions."

    - name: Install GitHub Runner via Azure RunCommand
      if: inputs.action == 'create'
      env:
        GH_URL: ${{ inputs.github_repo_url }}
        GH_TOKEN: ${{ secrets.GH_RUNNER_TOKEN }}
        ADMIN_USER: ${{ secrets.VM_ADMIN_USERNAME }}
      run: |
        # Use Azure RunCommand to securely execute the script on the VM via Azure Control Plane
        # This completely avoids SSH and the need for a Public IP Address.
        cat << EOF > install-runner.sh
        #!/bin/bash
        sudo apt update
        sudo apt install -y curl tar git jq
        
        # Run the installation as the admin user, not root
        su - ${ADMIN_USER} -c "
          set -e
          
          # Clean up any existing runner service if this is a retry/re-run
          if [ -d actions-runner ]; then
            cd actions-runner
            sudo ./svc.sh stop || true
            sudo ./svc.sh uninstall || true
            cd ..
            rm -rf actions-runner
          fi
          
          mkdir -p actions-runner && cd actions-runner
          curl -o actions-runner.tar.gz -L https://github.com/actions/runner/releases/download/v2.325.0/actions-runner-linux-x64-2.325.0.tar.gz
          tar xzf actions-runner.tar.gz
          
          # Pass the exact token provided in the secrets
          ./config.sh --url ${GH_URL} --token ${GH_TOKEN} --unattended --ephemeral
          sudo ./svc.sh install
          sudo ./svc.sh start
        "
        EOF
        echo "Executing installation script on VM..."
        OUTPUT=$(az vm run-command invoke \
          --resource-group ${{ env.RG_NAME }} \
          --name ${{ env.VM_NAME }} \
          --command-id RunShellScript \
          --scripts @install-runner.sh \
          --output json)
        
        # Print the stdout/stderr from the VM so it's visible in GitHub Actions
        echo "$OUTPUT" | jq -r '.value[0].message'
        
        # Check if the provisioning state was successful
        STATUS=$(echo "$OUTPUT" | jq -r '.value[0].displayStatus')
        if [ "$STATUS" != "Provisioning succeeded" ]; then
          echo "::error::Runner installation failed inside the VM!"
          exit 1
        fi
        
        echo "Runner successfully installed and started!"

    #################################################################
    # DESTROY
    #################################################################
    - name: Destroy Resource Group
      if: inputs.action == 'destroy'
      run: |
        # Delete the resource group asynchronously so the pipeline finishes instantly
        az group delete \
          --name ${{ env.RG_NAME }} \
          --yes \
          --no-wait
