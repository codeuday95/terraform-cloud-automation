# Environment
stage: "DEV"

# Container Registry & Images
image:
  registry: projectoriondevacr.azurecr.io
  pullPolicy: Always
  web:
    repository: hitcounter_web
    tag: "1.0"
  mongodb:
    repository: hitcounter_mongodb
    tag: "1.0"

# Horizontal Pod Autoscaler (HPA)
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

# Azure Key Vault CSI Integration
# These values MUST be provided by the deployment pipeline/ArgoCD per environment
keyvault:
  name: ""
  tenantId: ""
  userAssignedIdentityID: ""
  secretName: "CONNECTION_STRING"
