name: Bootstrap - Manual Deployment

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform action (plan or apply)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TERRAFORM_VERSION: '1.5.0'

jobs:
  bootstrap:
    name: Bootstrap Infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.BOOTSTRAP_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./bootstrap
        run: terraform init

      - name: Terraform Plan
        working-directory: ./bootstrap
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        if: github.event.inputs.terraform_action == 'plan'
        uses: actions/upload-artifact@v3
        with:
          name: bootstrap-tfplan
          path: bootstrap/tfplan
          retention-days: 7

      - name: Terraform Apply
        if: github.event.inputs.terraform_action == 'apply'
        working-directory: ./bootstrap
        run: terraform apply -auto-approve tfplan

      - name: Export Outputs
        if: github.event.inputs.terraform_action == 'apply'
        working-directory: ./bootstrap
        run: |
          terraform output -json > outputs.json
          echo "Bootstrap deployment completed successfully"
          cat outputs.json

      - name: Comment on Workflow Run
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Bootstrap ${{ github.event.inputs.terraform_action }} completed');
