name: Hit Counter - Build & Push to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'workloads/Workload-D-Aks-automation/Apps/hit-counter/**'
      - '.github/workflows/hit-counter-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'workloads/Workload-D-Aks-automation/Apps/hit-counter/**'

env:
  REGISTRY: projectoriondevacr.azurecr.io
  IMAGE_NAME_WEB: hitcounter_web
  IMAGE_NAME_MONGODB: hitcounter_mongodb
  IMAGE_TAG: "1.0"

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Node.js Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: ./workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./workloads/Workload-D-Aks-automation/Apps/hit-counter/NodeDockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MongoDB Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: ./workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./workloads/Workload-D-Aks-automation/Apps/hit-counter/MongoDockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build Successful** - Docker images built successfully.\n\n**Images Ready:**\n- `' + '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}`\n- `' + '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:${{ env.IMAGE_TAG }}`\n\nApprove to push to ACR on merge to main.'
            })

  push-to-acr:
    name: Push Images to ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.WORKLOAD_D_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR credentials
        run: |
          ACR_USERNAME=$(az acr credential show \
            --name $(echo ${{ env.REGISTRY }} | cut -d. -f1) \
            --query "username" -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name $(echo ${{ env.REGISTRY }} | cut -d. -f1) \
            --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "REGISTRY_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Push Node.js Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./workloads/Workload-D-Aks-automation/Apps/hit-counter/NodeDockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push MongoDB Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./workloads/Workload-D-Aks-automation/Apps/hit-counter
          file: ./workloads/Workload-D-Aks-automation/Apps/hit-counter/MongoDockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:${{ env.IMAGE_TAG }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MONGODB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release Annotation
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Hit Counter Docker images pushed to ACR',
              auto_merge: false,
              required_contexts: []
            })
